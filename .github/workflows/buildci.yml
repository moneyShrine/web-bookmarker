name: Build and Publish WebBookmarker-API

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-webbookmarker:
    name: Build WebBookmarker-API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Make sure mvnw is executable (extra safety)
      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Build with Maven (verify)
        run: ./mvnw clean verify -DskipTests

      # Build Docker image only on master branch
      - name: Build Docker Image with Buildpacks
        if: github.ref == 'refs/heads/master'
        run: |
          ./mvnw spring-boot:build-image \
            -DskipTests \
            -Dspring-boot.build-image.imageName=${{ secrets.DOCKER_USERNAME }}/joeyekpe/webbookmarker-api:latest

      # Login to Docker Hub
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/master'
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Push the image
      - name: Push Docker Image to Docker Hub
        if: github.ref == 'refs/heads/master'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/joeyekpe/webbookmarker-api:latest