name: Build and Publish WebBookmarker-API

on:
  push:
    branches: [ "master" ]

jobs:
  build-webbookmarker:
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Build with Maven
        run: ./mvnw clean verify -DskipTests

      # ✅ FIXED IMAGE NAME
      - name: Build Docker Image
        if: github.ref == 'refs/heads/master'
        run: |
          ./mvnw spring-boot:build-image \
            -DskipTests \
            -Dspring-boot.build-image.imageName=${{ secrets.DOCKER_USERNAME }}/webbookmarker-api:latest

      # ✅ Debug (optional but helpful)
      - name: List Docker Images
        run: docker images

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/master'
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ✅ FIXED PUSH
      - name: Push Docker Image
        if: github.ref == 'refs/heads/master'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/webbookmarker-api:latest